name: Lint and Test
on: push

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
    - name: Create uv environment
      run: uv venv
    - name: Install dependencies
      run: uv sync --all-groups
    - name: Cache LDraw parts library
      id: ldraw-cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.local/share/pyldraw3
        key: pyldraw3-${{ runner.os }}
    - name: Generate ldraw.library part/colour modules
      if: steps.ldraw-cache.outputs.cache-hit != 'true'
      run: |
        uv run ldraw download
        uv run ldraw generate
    - run: uv run ruff format --check .
    - run: uv run ruff check .
    - name: Run type checks
      run: |
        uv run ty check src tests
        uv run pyrefly check src tests
    - name: Run complexity checks
      # The reviewed baseline peaks at CCN 18; fail on regressions above it.
      run: uv run lizard --languages python --CCN 18 src tests
    - run: uv run deptry .
    - name: Run tests with coverage
      run: uv run pytest --run-slow --cov=legolization --cov-report=lcov --cov-report=html
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload coverage report as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-report-python-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 30
