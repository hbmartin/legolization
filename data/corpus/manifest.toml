# Self-evaluation corpus. Source of truth for `scripts/corpus.py` and
# `scripts/eval_corpus.py`. Mesh binaries and generated .npy files are
# gitignored; this manifest (URLs, hashes, generators, expectations) is
# what's committed.
#
# Mesh provenance: alecjacobson/common-3d-test-models @ 8a4f864 (2023-03-23).
# Licences vary per model (Stanford scans are research-use; Crane models are
# CC0; Suzanne is from Blender) - see the source repo's README for details.
# That is why the meshes are downloaded on demand rather than vendored.
#
# expect_min_buildable = how many of the 6 strategies must produce a
# buildable model for this input (0 = expected unbuildable by design).
#
# Mesh target_studs are sized for a feasible overnight sweep: per-solve
# LP cost grows superlinearly (~5s at n~1000 bricks; see the profiling
# campaign on PR #16), so 16-24 studs keeps 6 strategies x 6 meshes in
# hours, not days. largest_component_only opts a mesh into the
# fragment filter (off by default since commit 99c6cd8).

# --- curated meshes ------------------------------------------------------

[[model]]
name = "spot"
kind = "mesh"
path = "data/corpus/meshes/spot.obj"
source_url = "https://raw.githubusercontent.com/alecjacobson/common-3d-test-models/8a4f8642acaf43f9cd7b67858a1502e1055ef202/data/spot.obj"
sha256 = "0738b5e8608fed74e5e8c7aa8dd0af97b4b74f9f6cbf7aac84cd7e40b2e44a75"
